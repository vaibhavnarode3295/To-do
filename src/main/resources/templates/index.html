<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>To-Do Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eceff7, #f8f9fa);
            font-family: 'Segoe UI', sans-serif;
        }

        /* SIDEBAR */
        .sidebar {
            height: 100vh;
            width: 240px;
            background: white;
            position: fixed;
            left: 0;
            top: 0;
            padding: 25px 20px;
            box-shadow: 2px 0 15px rgba(0,0,0,0.10);
            border-radius: 0 20px 20px 0;
        }

        .sidebar-title {
            font-size: 22px;
            font-weight: 800;
            color: #4a4e69;
            text-align: center;
            margin-bottom: 30px;
        }

        .menu-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: none;
            border-radius: 10px;
            background: #f0f2f7;
            font-size: 16px;
            text-align: left;
            transition: 0.2s;
        }

        .menu-btn:hover {
            background: #e2e6f3;
        }

        .menu-btn.active {
            background: #6c5ce7;
            color: white;
        }

        /* MAIN CONTENT */
        .main-content {
            margin-left: 250px;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        .heading {
            font-size: 28px;
            font-weight: 800;
            color: #343a40;
        }

        /* ADD TASK BOX */
        .add-task-box {
            background: #ffffff;
            padding: 22px;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.06);
        }

        .btn-add {
            background-color: #6c5ce7;
            border-radius: 10px;
            color: white;
            padding: 10px 18px;
            font-size: 15px;
            transition: 0.2s;
        }

        .btn-add:hover {
            background-color: #5948d4;
        }

        /* TASK ITEMS */
        .task-item {
            background: #ffffff;
            border-left: 6px solid #6c5ce7;
            padding: 18px;
            border-radius: 12px;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.06);
            transition: 0.2s;
        }

        .task-item:hover {
            transform: translateY(-3px);
        }

        .task-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        .task-desc {
            font-size: 13px;
            color: #6c757d;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
        }

        .completed {
            background: #d4edda;
            color: #2e7d32;
        }

        .pending {
            background: #ffe9b3;
            color: #b47d00;
        }

        .action-btn {
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 13px;
        }

    </style>
</head>

<body>


<div class="sidebar">
    <div class="sidebar-title">To-Do Menu</div>

    <a th:href="@{/todo}">
        <button class="menu-btn active">🏠 Home</button>
    </a>
    <a th:href="@{/tasks/today}">
        <button class="menu-btn">📅 Today's Tasks</button>
    </a>

    <a th:href="@{/allTasks}">
        <button class="menu-btn">📌 All Tasks</button>
    </a>

    <a th:href="@{/tasks/last7}">
        <button class="menu-btn">
            ⏱ Last 7 Days Tasks
        </button>
    </a>

    <a th:href="@{/logout}">
        <button class="menu-btn" style="margin-top:50px;">🚪 Logout</button>
    </a>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <!-- Greeting -->
    <h2 class="heading mb-4">Today's Tasks</h2>

    <!-- Add Task Form -->
    <div class="add-task-box mb-4" id="addTask">
        <h5 class="mb-3">Add New Task</h5>

        <form th:action="@{/save}" method="post" th:object="${todo}">
            <input type="text" th:field="*{title}" class="form-control mb-2"
                   placeholder="Task Title" required>

            <textarea th:field="*{description}" class="form-control mb-3"
                      rows="2" placeholder="Task Description (optional)"></textarea>

            <button class="btn btn-add w-100">Add Task</button>
        </form>
    </div>

    <!-- Show Today's Tasks -->
    <div class="glass-card">

        <h5 class="mb-3">Your Tasks for Today</h5>

        <div th:if="${#lists.isEmpty(todos)}" class="text-center text-muted fs-5">
            No tasks added today.
        </div>

        <div th:each="t : ${todos}" class="task-item">

            <div class="d-flex justify-content-between">

                <div>
                    <div class="task-title" th:text="${t.title}"></div>
                    <div class="task-desc" th:text="${t.description}"></div>
                </div>

                <!-- Right Side Options -->
                <div class="text-end">

                    <span th:classappend="${t.status == 'Completed'} ? 'completed status-badge' : 'pending status-badge'"
                          th:text="${t.status}">
                    </span>

                    <div class="mt-2">

                        <!-- Mark Complete -->
                        <a th:if="${t.status != 'Completed'}"
                           th:href="@{'/done/' + ${t.id}}"
                           class="btn btn-success btn-sm action-btn">Done</a>

                        <!-- Delete -->
                        <form th:action="@{'/remove/' + ${t.id}}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger btn-sm"
                                    onclick="return confirm('Are you sure you want to delete this task?');">
                                Delete
                            </button>
                        </form>


                    </div>

                </div>

            </div>
        </div>

    </div>

</div>

</body>
</html>
