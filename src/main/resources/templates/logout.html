<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Logout</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
        background: linear-gradient(135deg, #eceff7, #f8f9fa);
        font-family: 'Segoe UI', sans-serif;
    }

    .center-box {
        max-width: 450px;
        margin: 120px auto;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        padding: 35px;
        border-radius: 16px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.10);
        text-align: center;
    }

    .heading {
        font-size: 26px;
        font-weight: 800;
        color: #343a40;
    }

    .btn-logout {
        background-color: #e63946;
        color: white;
        border-radius: 10px;
        padding: 10px 20px;
        font-size: 16px;
        border: none;
    }

    .btn-logout:hover {
        background-color: #c62828;
    }

    .btn-cancel {
        background-color: #6c5ce7;
        color: white;
        border-radius: 10px;
        padding: 10px 20px;
        font-size: 16px;
        border: none;
    }

    .btn-cancel:hover {
        background-color: #5948d4;
    }
  </style>
</head>

<body>

<div class="center-box">

  <h2 class="heading mb-3">Are you sure you want to logout?</h2>

  <p class="text-muted mb-4">You will need to log in again to access your tasks.</p>

  <!-- LOGOUT FORM -->
  <form th:action="@{/logout}" method="post">
    <button type="submit" class="btn btn-logout w-100 mb-3">Yes, Logout</button>
  </form>

  <!-- CANCEL BUTTON -->
  <a th:href="@{/todo}" class="btn btn-cancel w-100">Cancel</a>

</div>

</body>
</html>
