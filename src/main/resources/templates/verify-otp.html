<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP | To-Do App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #eef2f7; }
        .card {
            max-width: 400px;
            margin: 60px auto;
            padding: 25px;
            border-radius: 10px;
        }
        .otp-input {
            font-size: 22px;
            text-align: center;
            letter-spacing: 8px;
        }
    </style>
</head>
<body>

<div class="card shadow">

    <h4 class="text-center mb-3">Email Verification</h4>
    <p class="text-center text-muted">Enter the 6-digit OTP sent to your email</p>

    <!-- OTP Wrong -->
    <div th:if="${param.error}" class="alert alert-danger">
        Incorrect OTP. Try again!
    </div>

    <form th:action="@{/verify-otp}" method="post">

        <input type="text" name="otpInput" maxlength="6"
               class="form-control otp-input mb-3"
               placeholder="______" required>

        <button class="btn btn-primary w-100">Verify</button>

        <div class="text-center mt-3">
            <a th:href="@{/resend-otp}">Resend OTP?</a>
        </div>

    </form>
</div>

</body>
</html>
