<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register | To-Do App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #eef2f7; }
        .card {
            max-width: 450px;
            margin: 60px auto;
            padding: 25px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="card shadow">

    <h3 class="text-center mb-4">Create Account</h3>

    <form th:action="@{/saveUser}" method="post" th:object="${user}">

        <div class="mb-3">
            <label>Name</label>
            <input th:field="*{username}" type="text" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input th:field="*{email}" type="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input th:field="*{password}" type="password" class="form-control" required>
        </div>

        <button class="btn btn-success w-100">Register</button>

        <div class="text-center mt-3">
            <a th:href="@{/login}">Already have an account? Login</a>
        </div>

    </form>
</div>

</body>
</html>
