<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Tasks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eceff7, #f8f9fa);
            font-family: 'Segoe UI', sans-serif;
        }

        /* SIDEBAR */
        .sidebar {
            height: 100vh;
            width: 240px;
            background: white;
            position: fixed;
            left: 0;
            top: 0;
            padding: 25px 20px;
            box-shadow: 2px 0 15px rgba(0,0,0,0.10);
            border-radius: 0 20px 20px 0;
        }

        .sidebar-title {
            font-size: 22px;
            font-weight: 800;
            color: #4a4e69;
            text-align: center;
            margin-bottom: 30px;
        }

        .menu-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: none;
            border-radius: 10px;
            background: #f0f2f7;
            font-size: 16px;
            text-align: left;
            transition: 0.2s;
        }

        .menu-btn:hover {
            background: #e2e6f3;
        }

        .menu-btn.active {
            background: #6c5ce7;
            color: white;
        }

        /* MAIN CONTENT */
        .main-content {
            margin-left: 250px;
            padding: 20px;
        }

        .heading {
            font-size: 28px;
            font-weight: 800;
            color: #343a40;
        }

        /* CARD */
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        /* TASK ITEM */
        .task-item {
            background: #ffffff;
            border-left: 6px solid #6c5ce7;
            padding: 18px;
            border-radius: 12px;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.06);
            transition: 0.2s;
        }

        .task-item:hover {
            transform: translateY(-3px);
        }

        .task-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        .task-desc {
            font-size: 13px;
            color: #6c757d;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
        }

        .completed {
            background: #d4edda;
            color: #2e7d32;
        }

        .pending {
            background: #ffe9b3;
            color: #b47d00;
        }

        /* PAGINATION */
        .pagination a {
            border-radius: 8px !important;
            margin: 0 5px;
            padding: 8px 14px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-title">To-Do Menu</div>

    <a th:href="@{/todo}">
        <button class="menu-btn">🏠 Home</button>
    </a>
    <a th:href="@{/tasks/today}">
        <button class="menu-btn">📅 Today's Tasks</button>
    </a>
    <a th:href="@{/allTasks}">
        <button class="menu-btn active">📌 All Tasks</button>
    </a>
    <a th:href="@{/tasks/last7}">
        <button class="menu-btn">⏱ Last 7 Days</button>
    </a>
    <a th:href="@{/logout}">
        <button class="menu-btn" style="margin-top:50px;">🚪 Logout</button>
    </a>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <h2 class="heading mb-4">All Tasks</h2>

    <div class="glass-card">

        <div th:if="${#lists.isEmpty(taskPage.content)}" class="text-center text-muted fs-5">
            No tasks found.
        </div>

        <!-- TASK LIST -->
        <div th:each="t : ${taskPage.content}" class="task-item">

            <div class="d-flex justify-content-between">
                <div>
                    <div class="task-title" th:text="${t.title}"></div>
                    <div class="task-desc" th:text="${t.description}"></div>
                    <small class="text-muted" th:text="'Date: ' + ${t.createdAt}"></small>
                </div>

                <div class="text-end">
                    <span th:classappend="${t.status == 'Completed'} ? 'completed status-badge' : 'pending status-badge'"
                          th:text="${t.status}">
                    </span>
                </div>
            </div>

        </div>

        <!-- PAGINATION -->
        <nav class="mt-4">
            <ul class="pagination justify-content-center">

                <!-- Prev Button -->
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a th:href="@{'/allTasks?page=' + ${currentPage - 1}}" class="page-link">Previous</a>
                </li>

                <!-- Page Numbers -->
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{'/allTasks?page=' + ${i}}"
                       th:text="${i + 1}"></a>
                </li>

                <!-- Next Button -->
                <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                    <a th:href="@{'/allTasks?page=' + ${currentPage + 1}}" class="page-link">Next</a>
                </li>

            </ul>
        </nav>

    </div>

</div>

</body>
</html>
