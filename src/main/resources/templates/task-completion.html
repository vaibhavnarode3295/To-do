<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Tasks Completed</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Confetti JS -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd, #f8f9fa);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .container-box {
            background: white;
            width: 420px;
            padding: 40px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 10px 35px rgba(0,0,0,0.15);
            animation: fadeIn 1.2s ease-in-out;
        }

        /* Tick mark animation */
        .checkmark {
            width: 90px;
            height: 90px;
            display: block;
            margin: auto;
            border-radius: 50%;
            border: 5px solid #4CAF50;
            position: relative;
            animation: pop 0.6s ease forwards;
        }

        .checkmark::after {
            content: "";
            position: absolute;
            top: 20px;
            left: 28px;
            width: 25px;
            height: 50px;
            border-right: 5px solid #4CAF50;
            border-bottom: 5px solid #4CAF50;
            transform: rotate(45deg);
            opacity: 0;
            animation: draw 0.6s 0.5s forwards ease;
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes draw {
            to { opacity: 1; }
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            margin-top: 20px;
            color: #333;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .btn-back {
            background: #6c5ce7;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            width: 100%;
        }

        .btn-back:hover {
            background: #5948d4;
        }

        /* Fade animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>

<body>

<div class="container-box">
    <div class="checkmark"></div>

    <h1 class="title">You Did It! 🎉</h1>
    <p class="subtitle">All your tasks for today are completed.<br>Great job!</p>

    <a th:href="@{/todo}">
        <button class="btn-back">Back to Dashboard</button>
    </a>
</div>

<!-- Confetti Trigger -->
<script>
    // Burst confetti when page opens
    function fireConfetti() {
        confetti({
            particleCount: 200,
            spread: 80,
            origin: { y: 0.6 }
        });

        // Small follow-up after 1 sec
        setTimeout(() => {
            confetti({
                particleCount: 100,
                spread: 60,
                origin: { y: 0.6 }
            });
        }, 800);
    }

    window.onload = fireConfetti;
</script>

</body>
</html>
