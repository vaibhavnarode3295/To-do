<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Today's Tasks | To-Do App</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>

  <style>

    body {
        background: linear-gradient(135deg, #eef2f7, #e3f2fd);
        font-family: 'Segoe UI', sans-serif;
        min-height: 100vh;
        margin: 0;
    }



    /* MAIN CONTENT */
    .main-container {
        max-width: 750px;
        margin: 80px auto;
        padding: 20px;
    }

    .heading {
        font-size: 26px;
        font-weight: 800;
        color: #4a4e69;
        text-align: center;
        margin-bottom: 25px;
    }

    /* Task Card */
    .task-card {
        background: white;
        padding: 18px;
        border-radius: 14px;
        margin-bottom: 15px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.05);
        border-left: 6px solid #6c5ce7;
        transition: 0.3s;
    }

    .task-card:hover {
        transform: translateY(-3px);
    }

    .task-title {
        font-size: 20px;
        font-weight: 700;
        color: #333;
    }

    .task-desc {
        font-size: 14px;
        color: #666;
    }

    /* Status badges */
    .badge-status {
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 700;
    }

    .completed {
        background: #d4edda;
        color: #2e7d32;
    }

    .pending {
        background: #ffe9b3;
        color: #a67500;
    }

    .btn-action {
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 6px;
    }

  </style>
</head>

<body>

<!-- MAIN CONTENT -->
<div class="main-container">

  <h2 class="heading">Today's Tasks</h2>

  <!-- No Tasks -->
  <div th:if="${#lists.isEmpty(todos)}"
       class="text-center text-muted fs-5 mt-4">
    No tasks added today.
  </div>

  <!-- List Tasks -->
  <div th:each="t : ${todos}" class="task-card">

    <div class="d-flex justify-content-between">

      <div>
        <div class="task-title" th:text="${t.title}"></div>
        <div class="task-desc" th:text="${t.description}"></div>
      </div>

      <div class="text-end">

        <!-- STATUS -->
        <span th:classappend="${t.status == 'Completed'} ?
                        'badge-status completed' : 'badge-status pending'"
              th:text="${t.status}">
                </span>
        <div class="mt-2">

          <a th:if="${t.status != 'Completed'}"
             th:href="@{'/complete/' + ${t.id}}"
             class="btn btn-success btn-sm btn-action">
            Done
          </a>

          <!-- Delete -->
          <form th:action="@{'/delete/' + ${t.id}}" method="post" style="display:inline;">
            <button type="submit" class="btn btn-danger btn-sm"
                    onclick="return confirm('Are you sure you want to delete this task?');">
              Delete
            </button>
          </form>


        </div>
      </div>
    </div>
  </div>

  <div class="text-center mt-4">
    <a th:href="@{/todo}" class="btn btn-secondary">
      ⬅ Back to Home
    </a>
  </div>

</div>

</body>
</html>
